[graph]
all-features = true

[advisories]
db-urls = ["https://github.com/rustsec/advisory-db"]
ignore = []

[licenses]
allow = [
    "Apache-2.0",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8

[licenses.private]
# Path-only / vendored crates have no published license field — skip them.
ignore = true

[bans]
multiple-versions = "warn"
# wildcards = "allow" because sherpa-rs is a vendored path dep without a version field
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
