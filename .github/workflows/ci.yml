name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel stale runs on push to same ref — avoids burning CPU on outdated commits.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pinned toolchain
        run: rustup show active-toolchain || rustup toolchain install

      - name: Check formatting
        run: cargo fmt --check

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build via Docker (aarch64)
        # GHA cache — saves ~30-40 min on warm runs (QEMU aarch64 emulation is slow).
        run: |
          docker buildx build \
            --platform linux/arm64 \
            --target builder \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            .
