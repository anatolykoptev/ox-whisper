# release-please: conventional commits on main -> release PR -> tag + GitHub Release.
# The binary and Docker publish steps run in the SAME workflow so a
# GITHUB_TOKEN-created tag can trigger them (a separate tag-triggered workflow
# would be blocked by the Actions recursion guard).
name: Release

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Release PR / tag
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build-and-release:
    name: Build and release binary
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build via Docker (aarch64)
        run: |
          docker buildx build \
            --platform linux/arm64 \
            --target builder \
            --output type=local,dest=./out \
            .

      - name: Package binary + shared libs
        run: |
          mkdir -p dist/ox-whisper
          cp out/app/target/release/ox-whisper dist/ox-whisper/
          cp out/app/vendor/sherpa-onnx/lib/libsherpa-onnx-c-api.so dist/ox-whisper/
          cp out/app/vendor/sherpa-onnx/lib/libsherpa-onnx-cxx-api.so dist/ox-whisper/
          cp out/app/vendor/sherpa-onnx/lib/libonnxruntime.so dist/ox-whisper/
          cd dist && tar czf ../ox-whisper-linux-aarch64.tar.gz ox-whisper/

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: ox-whisper-linux-aarch64.tar.gz

  docker-release:
    name: Build and push Docker image
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/anatolykoptev/ox-whisper
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
